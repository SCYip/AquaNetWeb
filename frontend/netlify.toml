[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Environment variables injected at deploy time ──────────────────────────
# Netlify CDN serves the frontend; the browser calls the API at this URL.
[context.production.environment]
  VITE_API_URL = "https://api.aquanet-water.org/api"

[context.deploy-preview.environment]
  VITE_API_URL = "https://api.aquanet-water.org/api"

[context.branch-deploy.environment]
  VITE_API_URL = "https://api.aquanet-water.org/api"

# ── SPA routing ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
